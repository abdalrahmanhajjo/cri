# Render Blueprint (free web service): https://dashboard.render.com/select-repo?type=blueprint
# Required in dashboard (Render → your web service → Environment):
#   DATABASE_URL (Supabase Postgres), CORS_ORIGIN (https://YOUR-SERVICE.onrender.com)
#   SMTP_*, SUPABASE_* — see server/.env.example
# JWT_SECRET is auto-generated below (generateValue). To set your own, remove that block and add JWT_SECRET in the dashboard.
# Run DB migrations once from your machine: DATABASE_URL="…" npm run db:migrate
# Free tier: service sleeps after ~15 min idle (first request may take ~1 min). Disk is ephemeral — prefer Supabase Storage for uploads.

services:
  - type: web
    name: tripoli-explorer
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: SERVE_CLIENT_DIST
        value: true
      - key: JWT_SECRET
        generateValue: true
