# Render Blueprint (free web service): https://dashboard.render.com/select-repo?type=blueprint
# Required in dashboard (Render → your web service → Environment):
#   DATABASE_URL (Supabase Postgres), CORS_ORIGIN (https://YOUR-SERVICE.onrender.com)
#   SMTP_*, SUPABASE_* — see server/.env.example
# Optional (SEO): add GOOGLE_SITE_VERIFICATION in the dashboard (value from Search Console HTML-tag verification).
# Optional (SEO / social cards): set VITE_PUBLIC_SITE_URL=https://your-domain.com (build-time; Docker ARG or Vite build).
# Optional (LCP / images): VITE_SUPABASE_ORIGIN=https://YOUR_PROJECT.supabase.co (preconnect).
#   VITE_SUPABASE_IMAGE_TRANSFORM=1 only if your Supabase plan supports transforms (omit otherwise).
# JWT_SECRET is auto-generated below (generateValue). To set your own, remove that block and add JWT_SECRET in the dashboard.
# Run DB migrations once from your machine: DATABASE_URL="…" npm run db:migrate
# Free tier: service sleeps after ~15 min idle (first request may take ~1 min). Disk is ephemeral — prefer Supabase Storage for uploads.
# Feed video: MP4 remux +faststart; MOV/WebM/MKV transcoded to MP4. Long runs: set HTTP_SERVER_TIMEOUT_MS=900000 if your plan allows.

services:
  - type: web
    name: tripoli-explorer
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    # Liveness only; use GET /ready in your monitor if you need DB-gated readiness.
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: SERVE_CLIENT_DIST
        value: true
      - key: JWT_SECRET
        generateValue: true
