<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- ICO + 48×48 PNG for Google Search; SVG for modern tabs; apple-touch for home screen -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon-48.png" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/tripoli-lebanon-icon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Warm CDN used by bento hero + many cards (cuts TLS/DNS before first Unsplash request) -->
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <!-- Default home LCP image: discoverable before JS; skipped in-app when admin sets another hero -->
    <link rel="preload" as="image" href="/city.png" fetchpriority="high" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking; display=swap (Material Symbols need reliable load — do not use optional on this bundle). -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      />
    </noscript>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Visit Tripoli – Best spots, experiences & plans</title>
    <!-- Tiny critical paint while async CSS loads (matches theme.css) -->
    <style>
      html {
        background: #fafaf9;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #fafaf9;
        color: #1c1917;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- GTM after idle / load — cuts main-thread JS during LCP; tags still fire same session -->
    <script>
      function tripoliInitGtm() {
        (function (w, d, s, l, i) {
          w[l] = w[l] || [];
          w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
          var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s),
            dl = l != 'dataLayer' ? '&l=' + l : '';
          j.async = true;
          j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
          f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-5P8FD3C5');
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(tripoliInitGtm, { timeout: 4500 });
      } else {
        window.addEventListener('load', function () {
          setTimeout(tripoliInitGtm, 1);
        });
      }
    </script>
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-5P8FD3C5"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
