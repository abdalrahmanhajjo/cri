name: Tripoli Explorer Web CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    services:
      # Optional: Add postgres if tests need a real DB, 
      # but for now we'll assume smoke tests mock or don't require external DB 
      # (though some checks might fail if they truly need a DB).
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: tripoli_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install

      - name: Install Server Dependencies
        run: npm install --prefix server

      - name: Install Client Dependencies
        run: npm install --prefix client

      - name: Lint All
        run: npm run lint

      - name: Run Server Tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/tripoli_test
          NODE_ENV: test
          JWT_SECRET: ci-secret-placeholder
        run: npm run test --prefix server

      - name: Build Client
        run: npm run build --prefix client
